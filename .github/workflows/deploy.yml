name: Deploy para Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 65002 147.93.37.106 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          REMOTE_DIR="/home/u257882461/domains/inovasystemssolutions.com/public_html"
          ssh -i ~/.ssh/deploy_key -p 65002 u257882461@147.93.37.106 "rm -rf ${REMOTE_DIR}/* "
          scp -i ~/.ssh/deploy_key -P 65002 -r dist/* u257882461@147.93.37.106:${REMOTE_DIR}/
          ssh -i ~/.ssh/deploy_key -p 65002 u257882461@147.93.37.106 "ls ${REMOTE_DIR}/"
